services:
  - type: web
    name: portfolio-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://taptoquit.me
      - key: ALLOWED_ORIGINS
        value: https://taptoquit.me,https://www.taptoquit.me
      - key: MONGODB_URI
        sync: false         # Set this in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a strong secret
      - key: ADMIN_EMAIL
        sync: false         # Set this in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false         # Set this in Render dashboard - use a STRONG password
