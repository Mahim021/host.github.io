[build]
  publish = "."

# Redirect root to the portfolio landing page
[[redirects]]
  from = "/"
  to = "/front/index.html"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
